<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Filters</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
      }
      canvas {
        border: 1px solid #ccc;
        margin: 10px;
      }
      button {
        padding: 8px 16px;
        margin: 5px;
        font-size: 1em;
        cursor: pointer;
      }
      #rgb-info {
        display: inline-block;
        padding: 8px 16px;
        min-width: 200px;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <h1>Image Filters</h1>
    <div>
      <canvas id="original-canvas"></canvas>
      <canvas id="filtered-canvas"></canvas>
    </div>
    <div>
      <button id="btn-red">Red Filter</button>
      <button id="btn-gray">Grayscale</button>
      <button id="btn-negative">Negative</button>
     <button id="btn-blurry">Blurry</button>
    </div>
    <h2 id="rgb-info"></h2>

    <script>
      const image = new Image();
      image.src = "images/tiger1.jpg";

      const originalCanvas = document.getElementById("original-canvas");
      const filteredCanvas = document.getElementById("filtered-canvas");
      const originalCtx = originalCanvas.getContext("2d");
      const filteredCtx = filteredCanvas.getContext("2d");
      const rgbInfo = document.getElementById("rgb-info");

      // When the image loads, draw it on the original canvas
      image.onload = function () {
        originalCanvas.width = image.width;
        originalCanvas.height = image.height;
        filteredCanvas.width = image.width;
        filteredCanvas.height = image.height;

        originalCtx.drawImage(image, 0, 0);
      };

      // Color picker: show RGBA value on hover
      originalCanvas.addEventListener("mousemove", function (event) {
        const x = event.offsetX;
        const y = event.offsetY;
        const pixel = originalCtx.getImageData(x, y, 1, 1);
        const d = pixel.data;

        const rgba = `rgba(${d[0]}, ${d[1]}, ${d[2]}, ${(d[3] / 255).toFixed(2)})`;
        rgbInfo.style.background = rgba;
        rgbInfo.textContent = rgba;
        rgbInfo.style.color = d[0] + d[1] + d[2] < 380 ? "white" : "black";
      });

      // Helper: draw image on filtered canvas and return pixel data
      function getFilteredImageData() {
        filteredCtx.drawImage(image, 0, 0);
        return filteredCtx.getImageData(0, 0, filteredCanvas.width, filteredCanvas.height);
      }

      // Red filter (working example)
      function redFilter() {
        const imgData = getFilteredImageData();
        for (let i = 0; i < imgData.data.length; i += 4) {
          // Keep red (imgData.data[i]), zero out green and blue
          imgData.data[i + 1] = 0;
          imgData.data[i + 2] = 0;
        }
        filteredCtx.putImageData(imgData, 0, 0);
      }

      // TODO: Grayscale filter
      // Hint: average R, G, B, then set all three to that average
      function grayscaleFilter() {
        const imgData = getFilteredImageData();
        for (let i = 0; i < imgData.data.length; i += 4) {
          const avg = (imgData.data[i] + imgData.data[i + 1] + imgData.data[i + 2]) / 3;
          let factor;

          if (avg > 128) {
            factor = 0.5 + (avg - 128) / 255 * 0.5; // Lighter colors get closer to white
          } else {
            factor = 0.5 - (128 - avg) / 255 * 0.5; // Darker colors get closer to black
          }

          imgData.data[i] = avg * factor; // Red
          imgData.data[i + 1] = avg * factor; // Green
          imgData.data[i + 2] = avg * factor; // Blue
        }

        filteredCtx.putImageData(imgData, 0, 0);
      }

      // TODO: Negative filter
      // Hint: subtract each color value from 255
      function negativeFilter() {
        const imgData = getFilteredImageData();
        for (let i = 0; i < imgData.data.length; i += 4) {
          imgData.data[i] = 255 - imgData.data[i]; // Red
          imgData.data[i + 1] = 255 - imgData.data[i + 1]; // Green
          imgData.data[i + 2] = 255 - imgData.data[i + 2]; // Blue
        }
        filteredCtx.putImageData(imgData, 0, 0);
      }

      // TODO: Blurry filter
      // Hint: Apply a simple blur kernel (e.g., 3x3 average), repeated for a stronger blur
      function blurryFilter() {
        const imgData = getFilteredImageData();
        const width = filteredCanvas.width;
        const height = filteredCanvas.height;
        let blurredData = new Uint8ClampedArray(imgData.data);

        // Apply a 3x3 blur pass multiple times for a stronger blur effect.
        for (let pass = 0; pass < 3; pass++) {
          const newData = new Uint8ClampedArray(blurredData);

          for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
              const idx = (y * width + x) * 4;
              let r = 0, g = 0, b = 0;

              for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                  const neighborIdx = ((y + dy) * width + (x + dx)) * 4;
                  r += blurredData[neighborIdx];
                  g += blurredData[neighborIdx + 1];
                  b += blurredData[neighborIdx + 2];
                }
              }

              newData[idx] = r / 9;
              newData[idx + 1] = g / 9;
              newData[idx + 2] = b / 9;
            }
          }

          blurredData = newData;
        }

        const output = new ImageData(blurredData, width, height);
        filteredCtx.putImageData(output, 0, 0);
      }


      // Attach buttons
      document.getElementById("btn-red").addEventListener("click", redFilter);
      document.getElementById("btn-gray").addEventListener("click", grayscaleFilter);
      document.getElementById("btn-negative").addEventListener("click", negativeFilter);
      document.getElementById("btn-blurry").addEventListener("click", blurryFilter);
    </script>
  </body>
</html>
