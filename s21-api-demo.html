<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button> Click</button>
    <p id="result"></p>

    <script src="config.js"></script>
    <script> 
        const btn = document.querySelector("button");
        const result = document.getElementById("result");

        // Function to post a message
        async function postMessage(text) {
            try {
                const response = await fetch('https://oim.108122.xyz/message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Token': OIM_TOKEN
                    },
                    body: JSON.stringify({ message: text })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Message posted successfully:', data);
                return data;
            } catch (error) {
                console.error('Error posting message:', error);
            }
        }

        // Function to get and display Massachusetts town data
        async function showTowns() {
            try {
                const response = await fetch('https://oim.108122.xyz/mass', {
                    method: 'GET',
                    headers: {
                        'X-Token': OIM_TOKEN
                    },
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();

                // Clear previous results and build new HTML
                let html = `<h2>${data.name}</h2>`;
                html += `<p><strong>Governor:</strong> ${data.governor}</p>`;
                html += `<h3>Towns:</h3>`;
                
                for (const town of data.data) {
                    html += `<p><strong>${town.name}:</strong> Population ${town.population}</p>`;
                }
                
                result.innerHTML = html;
            } catch (error) {
                console.error('Error fetching towns:', error);
                result.innerHTML = `<p style="color: red;">Error loading data: ${error.message}</p>`;
            }
        }

        // Post your name when page loads
        postMessage('Hello from Julissa');

        // Show towns when button is clicked
        btn.addEventListener("click", showTowns);

    </script>

</body>
</html>
